<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photobooth for Marsya</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    font-family: sans-serif;
    background: #F5F5F5;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    margin:0;
}

.screen { display:none; width:100%; max-width:480px; flex-direction:column; align-items:center; padding:1.5rem; }
.active { display:flex; }

.btn-primary {
    background:#8C7851;
    color:white;
    padding:14px;
    border-radius:50px;
    width:100%;
    max-width:250px;
    margin:10px 0;
}

.btn-secondary {
    background:#ccc;
    padding:14px;
    border-radius:50px;
    width:100%;
    max-width:250px;
}

#camera-container {
    width:100%;
    max-width:360px;
    aspect-ratio:2/3;
    background:black;
    overflow:hidden;
    border-radius:12px;
}

#camera-feed {
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

#final-strip-canvas {
    max-width:100%;
    margin-bottom:1rem;
}
</style>
</head>

<body>

<div id="home-screen" class="screen active">
    <h1>Photobooth for Marsya</h1>
    <button onclick="startSession()" class="btn-primary">Mulai</button>
</div>

<div id="camera-screen" class="screen">
    <div id="camera-container">
        <video id="camera-feed" autoplay playsinline></video>
    </div>
</div>

<div id="result-screen" class="screen">
    <canvas id="final-strip-canvas"></canvas>
    <button id="download-btn" class="btn-primary">Unduh</button>
</div>

<script>

const FRAME_IMAGE_SRC = 'frame.png';

let photos = [];
let video = document.getElementById('camera-feed');
let frameImage = new Image();
frameImage.src = FRAME_IMAGE_SRC;

function navigateTo(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id+'-screen').classList.add('active');
}

async function startSession(){
    photos=[];
    navigateTo('camera');

    const stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:"user"},
        audio:false
    });

    video.srcObject = stream;

    for(let i=0;i<3;i++){
        await new Promise(r=>setTimeout(r,2000));
        captureImage();
    }

    generateStrip();
}

function captureImage(){
    const c=document.createElement('canvas');
    c.width=video.videoWidth;
    c.height=video.videoHeight;

    const ctx=c.getContext('2d');

    ctx.translate(c.width,0);
    ctx.scale(-1,1);
    ctx.drawImage(video,0,0);

    photos.push(c.toDataURL());
}

function generateStrip(){

    // tunggu frame load
    if (!frameImage.complete) {
        frameImage.onload = generateStrip;
        return;
    }

    const canvas=document.getElementById('final-strip-canvas');
    const ctx=canvas.getContext('2d');

    const targetWidth=600;
    const targetHeight=frameImage.height*(targetWidth/frameImage.width);

    canvas.width=targetWidth;
    canvas.height=targetHeight;

    // ukuran slot foto
    const photoWidth=targetWidth*0.9;
    const photoHeight=targetHeight*0.27;
    const x=(targetWidth-photoWidth)/2;

    const yPositions=[
        targetHeight*0.14,
        targetHeight*0.39,
        targetHeight*0.64
    ];

    let loaded=0;

    photos.forEach((src,i)=>{
        const img=new Image();

        img.onload=()=>{

            // 🔥 COVER (ANTI BOLONG)
            const imgRatio = img.width / img.height;
            const boxRatio = photoWidth / photoHeight;

            let sx, sy, sw, sh;

            if (imgRatio > boxRatio) {
                sh = img.height;
                sw = sh * boxRatio;
                sx = (img.width - sw) / 2;
                sy = 0;
            } else {
                sw = img.width;
                sh = sw / boxRatio;
                sx = 0;
                sy = (img.height - sh) / 2;
            }

            ctx.drawImage(
                img,
                sx, sy, sw, sh,
                x, yPositions[i], photoWidth, photoHeight
            );

            loaded++;

            if(loaded===3){
                // frame di atas (FINAL)
                ctx.drawImage(frameImage,0,0,targetWidth,targetHeight);
                prepareDownload(canvas);
            }
        };

        img.src=src;
    });

    if(video.srcObject){
        video.srcObject.getTracks().forEach(t=>t.stop());
    }

    navigateTo('result');
}

function prepareDownload(canvas){
    document.getElementById('download-btn').onclick=()=>{
        const a=document.createElement('a');
        a.download='photobooth.png';
        a.href=canvas.toDataURL();
        a.click();
    };
}

</script>

</body>
</html>
