<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth for Marsya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F5F5F5; color: #4A4238; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .screen { display: none; width: 100%; max-width: 480px; flex-direction: column; align-items: center; padding: 1.5rem; }
        .active { display: flex; }
        
        /* Bingkai Container untuk Live Preview */
        #booth-container { position: relative; width: 320px; aspect-ratio: 1 / 3; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; }
        #frame-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        /* Kamera Live */
        .preview-box { position: absolute; left: 50%; transform: translateX(-50%); width: 92%; height: 23%; overflow: hidden; background: #eee; }
        #live-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Slot Foto yang Sudah Jadi */
        .photo-slot { position: absolute; left: 50%; transform: translateX(-50%); width: 92%; height: 23%; object-fit: cover; display: none; z-index: 5; }

        .btn-primary { background-color: #8C7851; color: white; padding: 14px 28px; border-radius: 50px; font-weight: 600; cursor: pointer; width: 100%; max-width: 250px; margin: 10px 0; text-align: center; }
        #countdown-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-weight: 800; color: white; text-shadow: 0 0 20px rgba(0,0,0,0.8); z-index: 20; display: none; }
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 100; }
        .flash-active { display: block !important; animation: flash-anim 0.4s forwards; }
        @keyframes flash-anim { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="home-screen" class="screen active">
        <h1 class="text-2xl font-extrabold mb-8">Photobooth for Marsya</h1>
        <div class="bg-white p-8 rounded-3xl shadow-sm text-center w-full">
            <p class="mb-6">Siap beraksi di depan kamera?</p>
            <button onclick="startBooth()" class="btn-primary">ayo foto sekarang</button>
        </div>
    </div>

    <div id="camera-screen" class="screen">
        <div id="booth-container">
            <img id="frame-overlay" src="frame.png" alt="frame">
            <div id="countdown-overlay">5</div>
            
            <div id="video-wrapper" class="preview-box" style="top: 1.5%;">
                <video id="live-video" autoplay playsinline></video>
            </div>

            <img id="res-1" class="photo-slot" style="top: 1.5%;">
            <img id="res-2" class="photo-slot" style="top: 26.5%;">
            <img id="res-3" class="photo-slot" style="top: 51.5%;">
        </div>
        
        <div class="mt-6 w-full flex flex-col items-center">
            <p id="instruction" class="font-bold mb-2">Posisikan diri untuk Foto 1</p>
            <button id="start-timer-btn" onclick="startCountdown()" class="btn-primary">Mulai Hitung Mundur</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h2 class="text-xl font-bold mb-4 text-[#8C7851]">marmut cantik benerr</h2>
        <canvas id="final-canvas" class="rounded-lg shadow-2xl mb-6 w-64"></canvas>
        
        <button onclick="downloadImage()" class="btn-primary">Unduh Foto</button>
        <button onclick="shareImage()" class="btn-primary" style="background-color: #51728c;">Bagikan</button>
        <button onclick="location.reload()" class="btn-secondary mt-2">Kembali ke Sesi Foto</button>
    </div>

    <script>
        let currentStep = 1;
        let photos = [];
        const video = document.getElementById('live-video');
        const wrapper = document.getElementById('video-wrapper');
        
        const yPositions = ["1.5%", "26.5%", "51.5%"];

        function navigateTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id + '-screen').classList.add('active');
        }

        async function startBooth() {
            navigateTo('camera');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", aspectRatio: 2/3 } });
                video.srcObject = stream;
            } catch (err) {
                alert("Kamera error. Pastikan izin diberikan.");
                location.reload();
            }
        }

        function startCountdown() {
            const btn = document.getElementById('start-timer-btn');
            const overlay = document.getElementById('countdown-overlay');
            btn.disabled = true;
            btn.style.opacity = "0.5";
            
            let count = 5;
            overlay.style.display = "block";
            overlay.innerText = count;

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    overlay.innerText = count;
                } else {
                    clearInterval(timer);
                    overlay.style.display = "none";
                    takeSnap();
                }
            }, 1000);
        }

        function takeSnap() {
            // Flash
            const flash = document.getElementById('flash');
            flash.classList.add('flash-active');
            setTimeout(() => flash.classList.remove('flash-active'), 400);

            // Capture
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0);
            
            const data = canvas.toDataURL('image/png');
            photos.push(data);

            // Tampilkan hasil di slot
            const currentSlot = document.getElementById(`res-${currentStep}`);
            currentSlot.src = data;
            currentSlot.style.display = "block";

            currentStep++;

            if (currentStep <= 3) {
                // Pindahkan kamera ke slot berikutnya
                wrapper.style.top = yPositions[currentStep - 1];
                document.getElementById('instruction').innerText = `Posisikan diri untuk Foto ${currentStep}`;
                document.getElementById('start-timer-btn').disabled = false;
                document.getElementById('start-timer-btn').style.opacity = "1";
            } else {
                setTimeout(processFinal, 800);
            }
        }

        function processFinal() {
            const canvas = document.getElementById('final-canvas');
            const ctx = canvas.getContext('2d');
            const frameImg = new Image();
            frameImg.src = 'frame.png';

            frameImg.onload = () => {
                canvas.width = 600;
                canvas.height = 1800;
                
                // Gambar Frame
                ctx.drawImage(frameImg, 0, 0, 600, 1800);
                
                // Gambar Foto di belakang frame
                let loaded = 0;
                const pWidth = 552; // 92% dari 600
                const pHeight = 414; // Tinggi proporsional
                const xPos = (600 - pWidth) / 2;
                const yVals = [27, 477, 927]; // Koordinat pixel yang pas

                photos.forEach((p, i) => {
                    const img = new Image();
                    img.onload = () => {
                        ctx.globalCompositeOperation = 'destination-over';
                        ctx.drawImage(img, xPos, yVals[i], pWidth, pHeight);
                        ctx.globalCompositeOperation = 'source-over';
                        loaded++;
                        if (loaded === 3) navigateTo('result');
                    };
                    img.src = p;
                });
            };
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'Marmut-Cantik.png';
            link.href = document.getElementById('final-canvas').toDataURL();
            link.click();
        }

        async function shareImage() {
            const canvas = document.getElementById('final-canvas');
            canvas.toBlob(async (blob) => {
                const file = new File([blob], 'photobooth.png', { type: 'image/png' });
                if (navigator.share) {
                    try {
                        await navigator.share({ files: [file], title: 'Hasil Photobooth' });
                    } catch (err) { console.log("Share batal"); }
                } else {
                    alert("Gunakan fitur download, browser kamu tidak mendukung fitur berbagi langsung.");
                }
            });
        }
    </script>
</body>
</html>
