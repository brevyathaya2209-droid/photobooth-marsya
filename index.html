<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photobooth for Marsya</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    font-family: sans-serif;
    background: #F5F5F5;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    margin:0;
}

.screen { display:none; width:100%; max-width:480px; flex-direction:column; align-items:center; padding:1.5rem; }
.active { display:flex; }

.btn-primary {
    background:#8C7851;
    color:white;
    padding:14px;
    border-radius:50px;
    width:100%;
    max-width:250px;
    margin:10px 0;
}

.btn-secondary {
    background:#D7D3CB;
    padding:14px;
    border-radius:50px;
    width:100%;
    max-width:250px;
}

#camera-container {
    width:100%;
    max-width:360px;
    aspect-ratio:2/3;
    background:black;
    overflow:hidden;
    border-radius:12px;
    position:relative;
}

#camera-feed {
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

#countdown-container {
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.3);
}

#countdown-text {
    color:white;
    font-size:80px;
    font-weight:bold;
}

#flash {
    position:fixed;
    inset:0;
    background:white;
    display:none;
    z-index:100;
}

.flash-active {
    display:block;
    animation:flash 0.4s forwards;
}

@keyframes flash {
    from {opacity:1;}
    to {opacity:0;}
}

#final-strip-canvas {
    max-width:100%;
    margin-bottom:1rem;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="flash"></div>

<div id="home-screen" class="screen active">
    <h1 style="font-weight:800;margin-bottom:20px;">Photobooth for Marsya</h1>
    <button onclick="startSession()" class="btn-primary">Mulai Sekarang</button>
</div>

<div id="camera-screen" class="screen">
    <div id="camera-container">
        <video id="camera-feed" autoplay playsinline></video>
        <div id="countdown-container">
            <div id="countdown-text">5</div>
        </div>
    </div>
    <p id="session-info">Foto 1 dari 3</p>
</div>

<div id="result-screen" class="screen">
    <canvas id="final-strip-canvas"></canvas>
    <button id="download-btn" class="btn-primary">Unduh Foto</button>
    <button onclick="retakeAll()" class="btn-secondary">Foto Ulang</button>
</div>

<script>

const FRAME_IMAGE_SRC = 'frame.png';

let photos = [];
let video = document.getElementById('camera-feed');
let frameImage = new Image();
frameImage.src = FRAME_IMAGE_SRC;

function navigateTo(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id+'-screen').classList.add('active');
}

async function startSession(){
    photos=[];
    navigateTo('camera');

    try{
        const stream = await navigator.mediaDevices.getUserMedia({
            video:{facingMode:"user"},
            audio:false
        });

        video.srcObject = stream;

        for(let i=1;i<=3;i++){
            document.getElementById('session-info').innerText=`Foto ${i} dari 3`;

            await runCountdown(5);
            triggerFlash();
            captureImage();

            if(i<3) await new Promise(r=>setTimeout(r,1000));
        }

        generateStrip();

    }catch{
        alert("Kamera tidak dapat diakses");
        navigateTo('home');
    }
}

function runCountdown(sec){
    return new Promise(resolve=>{
        let n=sec;
        const box=document.getElementById('countdown-container');
        const text=document.getElementById('countdown-text');

        box.style.display='flex';
        text.innerText=n;

        const i=setInterval(()=>{
            n--;
            if(n>0){
                text.innerText=n;
            }else{
                clearInterval(i);
                box.style.display='none';
                resolve();
            }
        },1000);
    });
}

function triggerFlash(){
    const f=document.getElementById('flash');
    f.classList.add('flash-active');
    setTimeout(()=>f.classList.remove('flash-active'),400);
}

function captureImage(){
    const c=document.createElement('canvas');
    const sw=video.videoWidth;
    const sh=video.videoHeight;

    c.width=sw;
    c.height=sh;

    const ctx=c.getContext('2d');

    ctx.translate(sw,0);
    ctx.scale(-1,1);
    ctx.drawImage(video,0,0);

    photos.push(c.toDataURL());
}

function generateStrip(){

    if (!frameImage.complete) {
        frameImage.onload = generateStrip;
        return;
    }

    const canvas=document.getElementById('final-strip-canvas');
    const ctx=canvas.getContext('2d');

    const targetWidth=600;
    const targetHeight=frameImage.height*(targetWidth/frameImage.width);

    canvas.width=targetWidth;
    canvas.height=targetHeight;

    // 🔥 SLOT FIX PRESISI
    const photoWidth = targetWidth * 0.88;
    const photoHeight = targetHeight * 0.235;
    const x = (targetWidth - photoWidth) / 2;

    const yPositions = [
        targetHeight * 0.155,
        targetHeight * 0.435,
        targetHeight * 0.715
    ];

    let loaded=0;

    photos.forEach((src,i)=>{
        const img=new Image();

        img.onload=()=>{

            // 🔥 COVER (ANTI BOLONG)
            const imgRatio = img.width / img.height;
            const boxRatio = photoWidth / photoHeight;

            let sx, sy, sw, sh;

            if (imgRatio > boxRatio) {
                sh = img.height;
                sw = sh * boxRatio;
                sx = (img.width - sw) / 2;
                sy = 0;
            } else {
                sw = img.width;
                sh = sw / boxRatio;
                sx = 0;
                sy = (img.height - sh) / 2;
            }

            ctx.drawImage(
                img,
                sx, sy, sw, sh,
                x, yPositions[i], photoWidth, photoHeight
            );

            loaded++;

            if(loaded===3){
                // 🔥 FRAME DI ATAS (FINAL)
                ctx.drawImage(frameImage,0,0,targetWidth,targetHeight);
                prepareDownload(canvas);
            }
        };

        img.src=src;
    });

    if(video.srcObject){
        video.srcObject.getTracks().forEach(t=>t.stop());
    }

    navigateTo('result');
}

function prepareDownload(canvas){
    document.getElementById('download-btn').onclick=()=>{
        const a=document.createElement('a');
        a.download='Photobooth-Marsya.png';
        a.href=canvas.toDataURL();
        a.click();
    };
}

function retakeAll(){
    navigateTo('home');
}

</script>

</body>
</html>
