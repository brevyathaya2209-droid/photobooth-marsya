<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth for Marsya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F5F5F5; color: #4A4238; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .screen { display: none; width: 100%; max-width: 480px; flex-direction: column; align-items: center; padding: 1.5rem; }
        .active { display: flex; }
        .btn-primary { background-color: #8C7851; color: white; padding: 14px 28px; border-radius: 50px; font-weight: 600; transition: all 0.3s; border: none; cursor: pointer; width: 100%; max-width: 250px; margin: 10px 0; }
        .btn-primary:active { transform: scale(0.96); background-color: #766543; }
        .btn-secondary { background-color: #D7D3CB; color: #4A4238; padding: 14px 28px; border-radius: 50px; font-weight: 600; cursor: pointer; width: 100%; max-width: 250px; border: none; }
        #camera-container { position: relative; width: 100%; max-width: 360px; aspect-ratio: 2 / 3; background: black; border-radius: 12px; overflow: hidden; margin-bottom: 1rem; }
        #camera-feed { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #countdown-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }
        #countdown-text { color: white; font-size: 8rem; font-weight: 800; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 100; }
        .flash-active { display: block !important; animation: flash-anim 0.5s ease-out forwards; }
        @keyframes flash-anim { from { opacity: 1; } to { opacity: 0; } }
        #final-strip-canvas { max-width: 100%; height: auto; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="home-screen" class="screen active">
        <h1 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 2rem;">Photobooth for Marsya</h1>
        <div style="background: white; padding: 2rem; border-radius: 20px; text-align: center; width: 100%;">
            <p style="margin-bottom: 1.5rem;">Siap untuk 3 sesi foto? (5 Detik/Sesi)</p>
            <button onclick="startSession()" class="btn-primary">Mulai Sekarang</button>
        </div>
    </div>

    <div id="camera-screen" class="screen">
        <div id="camera-container">
            <video id="camera-feed" autoplay playsinline></video>
            <div id="countdown-container">
                <div id="countdown-text">5</div>
            </div>
        </div>
        <p id="session-info" style="font-weight: 600;">Foto 1 dari 3</p>
    </div>

    <div id="result-screen" class="screen">
        <canvas id="final-strip-canvas"></canvas>
        <button id="download-btn" class="btn-primary">Unduh Foto</button>
        <button onclick="retakeAll()" class="btn-secondary">Foto Ulang (Retake)</button>
        <p style="margin-top: 15px; font-size: 0.8rem; color: #888;">Terima Kasih</p>
    </div>

    <script>
        const FRAME_IMAGE_SRC = 'frame.png';
        const FRAME_IMAGE_RATIO = 1 / 3; 
        
        let photos = [];
        let video = document.getElementById('camera-feed');
        let frameImage = new Image();
        frameImage.src = FRAME_IMAGE_SRC;

        function navigateTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId + '-screen').classList.add('active');
        }

        async function startSession() {
            photos = [];
            navigateTo('camera');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", aspectRatio: 2/3 }, 
                    audio: false 
                });
                video.srcObject = stream;
                
                // Mulai sequence otomatis
                for (let i = 1; i <= 3; i++) {
                    document.getElementById('session-info').innerText = `Foto ${i} dari 3`;
                    await runCountdown(5);
                    triggerFlash();
                    captureImage();
                    if (i < 3) await new Promise(r => setTimeout(r, 1000));
                }
                
                generateStrip();
            } catch (err) {
                alert("Kamera tidak dapat diakses.");
                navigateTo('home');
            }
        }

        function runCountdown(seconds) {
            return new Promise(resolve => {
                let count = seconds;
                const container = document.getElementById('countdown-container');
                const text = document.getElementById('countdown-text');
                container.style.display = 'flex';
                text.innerText = count;

                const interval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        text.innerText = count;
                    } else {
                        clearInterval(interval);
                        container.style.display = 'none';
                        resolve();
                    }
                }, 1000);
            });
        }

        function triggerFlash() {
            const flash = document.getElementById('flash');
            flash.classList.add('flash-active');
            setTimeout(() => flash.classList.remove('flash-active'), 500);
        }

        function captureImage() {
            const tempCanvas = document.createElement('canvas');
            const targetRatio = 2 / 3;
            const sw = video.videoWidth;
            const sh = video.videoWidth / targetRatio;
            
            tempCanvas.width = sw;
            tempCanvas.height = sh;
            const ctx = tempCanvas.getContext('2d');
            
            const sourceY = (video.videoHeight - sh) / 2;
            
            // Mirroring balik agar hasil foto tidak terbalik
            ctx.translate(sw, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, sourceY, sw, sh, 0, 0, sw, sh);
            
            photos.push(tempCanvas.toDataURL('image/png'));
        }

        function generateStrip() {
            const canvas = document.getElementById('final-strip-canvas');
            const ctx = canvas.getContext('2d');

            const targetWidth = 600; 
            const targetHeight = targetWidth / FRAME_IMAGE_RATIO;
            canvas.width = targetWidth;
            canvas.height = targetHeight;

            // 1. Gambar Bingkai
            ctx.drawImage(frameImage, 0, 0, targetWidth, targetHeight);

            // 2. Setting Foto (SANGAT NAIK & ZOOM)
            const photoWidth = targetWidth * 0.88; // Zoom lebih besar
            const photoHeight = photoWidth * 1.5; 
            const x = (targetWidth - photoWidth) / 2;

            const yPositions = [
                targetHeight * 0.012, // Sangat Naik
                targetHeight * 0.262, 
                targetHeight * 0.512  
            ];

            let loaded = 0;
            photos.forEach((src, i) => {
                const img = new Image();
                img.onload = () => {
                    ctx.globalCompositeOperation = 'destination-over';
                    ctx.drawImage(img, x, yPositions[i], photoWidth, photoHeight);
                    ctx.globalCompositeOperation = 'source-over';
                    loaded++;
                    if (loaded === 3) prepareDownload(canvas);
                };
                img.src = src;
            });

            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            navigateTo('result');
        }

        function prepareDownload(canvas) {
            const btn = document.getElementById('download-btn');
            btn.onclick = () => {
                const link = document.createElement('a');
                link.download = 'Photobooth-Marsya.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            };
        }

        function retakeAll() {
            navigateTo('home');
        }
    </script>
</body>
</html>
