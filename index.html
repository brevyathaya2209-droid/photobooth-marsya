<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoboothforMarsyaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F5F5F5; /* Neutral Light Gray */
            color: #4A4238; /* Dark Brown */
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh;
        }

        /* Navigasi layar */
        .screen { display: none; width: 100%; max-width: 480px; align-items: center; flex-direction: column; padding: 1.5rem; }
        .active { display: flex; }

        /* Tombol */
        .btn-primary {
            background-color: #8C7851; /* Natural Brown */
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            width: 100%;
            max-width: 250px;
        }

        .btn-primary:active { transform: scale(0.96); background-color: #766543; }
        .btn-secondary { background-color: #D7D3CB; color: #4A4238; } /* Light Neutral */
        .btn-secondary:active { background-color: #C1BCB3; }

        /* Kamera dan Countdown */
        #camera-container {
            position: relative; width: 100%; max-width: 360px;
            aspect-ratio: 3 / 4;
            background: black;
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid #D7D3CB;
        }

        #camera-feed {
            width: 100%; height: 100%; object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
        }

        #countdown-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3);
            pointer-events: none;
            opacity: 0; transition: opacity 0.3s;
        }
        #countdown-container.visible { opacity: 1; }
        
        #countdown-text {
            color: white;
            font-size: 8rem;
            font-weight: bold;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        /* Efek Flash */
        .flash-effect {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 100;
        }
        .flash-active { animation: flashAnim 0.3s ease-out; }
        @keyframes flashAnim {
            0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; }
        }

        /* Area Hasil Akhir */
        #final-strip-container {
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 2rem;
            width: 100%; max-width: 320px;
            aspect-ratio: 1 / 3; /* Pastikan proporsi strip */
        }
        #final-strip-canvas {
            width: 100%; height: 100%;
            object-fit: contain;
        }

        /* Pengaturan kontrol yang disembunyikan */
        .hidden { display: none !important; }
        .flex-row { display: flex; gap: 0.75rem; width: 100%; justify-content: center; }

    </style>
</head>
<body>

    <div id="flash" class="flash-effect"></div>

    <section id="home" class="screen active text-center">
        <h1 class="text-3xl font-semibold mb-3 text-[#4A4238]">PhotoboothforMarsyaa</h1>
        <p class="text-gray-500 mb-10">Tangkap momen indahmu dengan gaya natural.</p>
        <button onclick="navigateTo('capture')" class="btn-primary shadow-lg">Mulai Sekarang</button>
    </section>

    <section id="capture" class="screen">
        <div id="camera-container" class="mb-8 relative">
            <video id="camera-feed" autoplay playsinline></video>
            <div id="countdown-container">
                <span id="countdown-text">5</span>
            </div>
        </div>
        
        <div id="capture-controls" class="flex flex-col gap-4 w-full items-center">
            <button id="start-btn" onclick="startSession()" class="btn-primary">Ambil Foto (5 Detik)</button>
            <div id="post-capture-options" class="hidden flex-row">
                <button onclick="resetSession()" class="btn-primary btn-secondary">Retake</button>
                <button onclick="generateStrip()" class="btn-primary">Lanjut</button>
            </div>
        </div>
    </section>

    <section id="result" class="screen">
        <div id="final-strip-container">
            <canvas id="final-strip-canvas"></canvas>
        </div>
        
        <button id="download-btn" class="btn-primary mb-5">Unduh Foto</button>
        <p class="text-gray-400 italic mb-6">Terima Kasih</p>
        
        <button onclick="location.reload()" class="text-sm text-gray-500 underline">Kembali ke Home</button>
    </section>

    <script>
        // === KONFIGURASI ===
        // 1. Ganti 'frame.png' dengan nama file bingkai Anda (harus ada di folder yang sama)
        // 2. Bingkai harus dalam format PNG dengan area foto transparan.
        const FRAME_IMAGE_SRC = 'frame.png'; 
        const FRAME_IMAGE_RATIO = 1/3; // Strip 1x3

        let photos = [];
        const video = document.getElementById('camera-feed');
        const frameImage = new Image();
        frameImage.src = FRAME_IMAGE_SRC;

        function navigateTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if (screenId === 'capture') {
                startCamera();
            } else if (screenId === 'home') {
                stopCamera();
            }
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", aspectRatio: 2/3 }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Mohon izinkan akses kamera untuk menggunakan photobooth.");
                navigateTo('home');
            }
        }

        function stopCamera() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        }

        function startSession() {
            photos = [];
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('post-capture-options').classList.add('hidden');
            takeSnapshots(3);
        }

        async function takeSnapshots(count) {
            for (let i = 0; i < count; i++) {
                await countdown(5);
                triggerFlash();
                captureImage();
                if (i < count - 1) {
                    await new Promise(resolve => setTimeout(resolve, 1000)); // Jeda 1 detik antar foto
                }
            }
            document.getElementById('post-capture-options').classList.remove('hidden');
        }

        function countdown(seconds) {
            return new Promise(resolve => {
                let current = seconds;
                const container = document.getElementById('countdown-container');
                const text = document.getElementById('countdown-text');
                
                container.classList.add('visible');
                text.innerText = current;

                const timer = setInterval(() => {
                    current--;
                    if (current > 0) {
                        text.innerText = current;
                    } else {
                        clearInterval(timer);
                        container.classList.remove('visible');
                        resolve();
                    }
                }, 1000);
            });
        }

        function triggerFlash() {
            const flash = document.getElementById('flash');
            flash.classList.add('flash-active');
            setTimeout(() => flash.classList.remove('flash-active'), 300);
        }

        function captureImage() {
            const tempCanvas = document.createElement('canvas');
            
            // Kita tentukan target rasio 2:3
            const targetRatio = 2 / 3;
            
            // Tentukan ukuran canvas (kita gunakan lebar asli video)
            const sw = video.videoWidth;
            const sh = video.videoWidth / targetRatio; // Menghitung tinggi ideal 2:3

            tempCanvas.width = sw;
            tempCanvas.height = sh;
            const ctx = tempCanvas.getContext('2d');

            // Hitung titik tengah agar tidak gepeng (Cropping tengah)
            const sourceY = (video.videoHeight - sh) / 2;

            // Gambar ke canvas: drawImage(image, sx, sy, sWidth, sHeight, dx, dy, dWidth, dHeight)
            ctx.drawImage(video, 0, sourceY, sw, sh, 0, 0, sw, sh);
            
            photos.push(tempCanvas.toDataURL('image/png'));
        }



        function resetSession() {
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('post-capture-options').classList.add('hidden');
            photos = [];
        }

        function generateStrip() {
            if (photos.length < 3) return;

            const canvas = document.getElementById('final-strip-canvas');
            const ctx = canvas.getContext('2d');

            // Atur ukuran canvas strip sesuai ukuran frame kpop Anda
            // Asumsi frame memiliki proporsi tinggi = 3 * lebar
            const targetWidth = 600; 
            const targetHeight = targetWidth / FRAME_IMAGE_RATIO;
            
            canvas.width = targetWidth;
            canvas.height = targetHeight;

            // 1. Gambar Bingkai (frame.png) terlebih dahulu
            ctx.drawImage(frameImage, 0, 0, targetWidth, targetHeight);

            // 2. Gambar Foto di area yang benar
            // Ini adalah bagian yang paling krusial dan butuh penyesuaian manual
            // tergantung pada posisi area hitam (transparan) di file frame.png Anda.
            
            // Anggap bingkai Anda memiliki 3 slot foto. Kita harus menghitung 
            // koordinat X, Y, serta lebar & tinggi masing-masing slot.

            // === Langkah 3: Mengedit Posisi dan Zoom Foto ke Lubang Bingkai (GANTI KODE INI) ===
            // === HAPUS ANGKA 0.82 DI BARIS 285 DAN GANTI MENJADI 0.90 ===
            const photoWidth = targetWidth * 0.90; 

            const photoHeight = photoWidth / (2 / 3); // Menjaga rasio tetap 2:3
            const x = targetWidth * 0.09; // Menggeser sedikit ke kanan agar center setelah dizoom

            // === GANTI BLOK INI (BARIS 290-294) AGAR FOTO SANGAT NAIK ===
            const yPositions = [
            targetHeight * 0.015, // Slot Atas (Sangat Naik, pas di lubang paling atas bingkai 2:3)
            targetHeight * 0.265, // Slot Tengah
            targetHeight * 0.515  // Slot Bawah
            ];


            let loadedPhotos = 0;
            for (let i = 0; i < 3; i++) {
                const img = new Image();
                img.onload = () => {
                    const y = yPositions[i]; 
                    ctx.globalCompositeOperation = 'destination-over';
                    ctx.drawImage(img, x, y, photoWidth, photoHeight);
                    ctx.globalCompositeOperation = 'source-over';
                    
                    loadedPhotos++;
                    if (loadedPhotos === 3) {
                        const downloadBtn = document.getElementById('download-btn');
                        downloadBtn.onclick = () => {
                            const link = document.createElement('a');
                            link.download = 'Marsyaa-Photobooth.png';
                            link.href = canvas.toDataURL('image/png');
                            link.click();
                        };
                    }
                };
                img.src = photos[i];
            }






            navigateTo('result');
        }
    </script>
</body>
</html>
